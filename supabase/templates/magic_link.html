<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seu acesso ao RentFlow</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0a;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0a;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background:#111;border:1px solid #222;border-radius:12px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="padding:32px 40px 24px;border-bottom:1px solid #1a1a1a;">
              <p style="margin:0;font-size:20px;font-weight:700;color:#e2e8f0;letter-spacing:-0.5px;">
                🔑 RentFlow
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px 40px;">
              <p style="margin:0 0 8px;font-size:14px;color:#94a3b8;">Seu código de acesso</p>
              <p style="margin:0 0 28px;font-size:40px;font-weight:800;letter-spacing:8px;color:#818cf8;font-family:'Courier New',monospace;">
                {{ .Token }}
              </p>
              <p style="margin:0 0 24px;font-size:14px;color:#64748b;line-height:1.6;">
                Este código expira em <strong style="color:#94a3b8;">1 hora</strong>.
                Se você não solicitou este acesso, ignore este e-mail.
              </p>
              <p style="margin:0;font-size:13px;color:#475569;">
                Prefere clicar em um link?
                <a href="{{ .ConfirmationURL }}" style="color:#818cf8;text-decoration:none;">Entrar no RentFlow →</a>
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px;border-top:1px solid #1a1a1a;">
              <p style="margin:0;font-size:11px;color:#334155;text-align:center;">
                © 2026 RentFlow SaaS · Plataforma Institucional
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
